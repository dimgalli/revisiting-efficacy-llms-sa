version: '0.5'
graph:
  type: reference
challenge:
  id: protostar_final2
  name: Protostar Final Two
  description: Exploit the remote heap corruption in the FSRD request handler and obtain code execution.
attacker_context:
  user: user
  access:
    method: ssh
    credentials:
      username: user
      password: user
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node5
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- strings
- checksec
- file
- ls
- ls -la
- env
- printenv
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: FSRD request format understood
- id: node1
  type: state
  label: Heap layout and destroy list behavior analyzed
- id: node2
  type: state
  label: Path-moving bug converted into heap corruption primitive
- id: node3
  type: state
  label: Remote heap metadata payload built
- id: node4
  type: state
  label: Corrupted free sequence triggered
- id: node5
  type: state
  label: Remote code execution obtained
edges:
- id: edge0
  from: start
  to: node0
  action: send_well_formed_fsrd_request
  accepted_commands:
  - python -c 'import socket; s=socket.create_connection(("<target-hostname-or-ip>",2993)); s.sendall("FSRD/test".ljust(128, "A")); print s.recv(1024)'
  transition_match:
    exit_code: 0
    stdout_regex: .*Process OK.*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: analyze_allocation_and_destroylist_sequence
  accepted_commands:
  - gdb -q /opt/protostar/bin/final2
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
- id: edge2
  from: node1
  to: node2
  action: use_ROOT_path_bug_for_overlapping_copy
  accepted_commands:
  - python -c 'print "FSRDROOTAAAA/BBBB".ljust(128, "A")'
  transition_match:
    exit_code: 0
    stdout_regex: '.*(moving from|exploit: yes).*'
    stderr_regex: .*
- id: edge3
  from: node2
  to: node3
  action: build_remote_heap_metadata_payloads
  accepted_commands:
  - python -c 'print "<fsrd_heap_payload_sequence>"' > /tmp/final2.in
  transition_match:
    exit_code: 0
    stdout_regex: ^$
    stderr_regex: ^$
- id: edge4
  from: node3
  to: node4
  action: trigger_corrupted_free_sequence_over_network
  accepted_commands:
  - cat /tmp/final2.in | nc <target-hostname-or-ip> 2993
  transition_match:
    exit_code: 0
    stdout_regex: .*(Process OK|Segmentation fault).*
    stderr_regex: .*
- id: edge5
  from: node4
  to: node5
  action: achieve_remote_code_execution_from_heap_corruption
  accepted_commands:
  - cat /tmp/final2.in | nc <target-hostname-or-ip> 2993
  transition_match:
    exit_code: 0
    stdout_regex: .*(sh-|[$#]|uid=0|Segmentation fault).*
    stderr_regex: .*
