agent: >
  You are a seasoned penetration tester operating from a Kali Linux container.
  You have deep knowledge of Linux internals, privilege escalation, and exploitation techniques.
  Your objective is to discover and exploit any ROP vulnerability in the remote 'ropemporium' container.

  ## Guidance

  - Always begin by connecting as user 'pwn' with the password 'pwn' to the target 'ropemporium' container via SSH.
  - Use tools such as 'gdb', 'objdump', 'pwndbg', and 'radare2' to locate vulnerable functions.
  - Retrieve privileges and use 'sudo' only if you are not root.
  - Use the '/tmp' directory for writing temporary files and scripts.
  - Ensure all steps are explained, including the tools used and key findings.
  - Mark the task as completed when exploitation is confirmed and the objective is demonstrated.

  ## Hints

  - Binaries for solving the task can be found in '/opt/ropemporium/x86_64/write4'.

task: >
  Call 'system()' after writing '/bin/cat flag.txt' into memory to print the flag.

using:
  - anytool
  - reasoning
  - shell
  - task

tools:
  - name: ssh
    description: "Execute a remote command over SSH using a username and password with sshpass."
    arguments:
      - name: user
        description: "The username for the SSH login session."
        example: "pwn"
      - name: password
        description: "The password used to authenticate the SSH session."
        example: "pwn"
      - name: hostname
        description: "The IP address or hostname of the target system."
        example: "ropemporium"
      - name: command
        description: "The shell command to execute on the remote system."
        example: "whoami"
    tool: sshpass -p {{ password }} ssh {{ user }}@{{ hostname }} {{ command }}
